name: Prompt Eval

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  prompt-eval:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write  # needed for sticky-pull-request-comment + labeling PRs
      issues: write         # PRs are issues in the API – needed for gh label edits
      actions: read         # needed for gh CLI to fetch artifacts
      statuses: write       # needed to post commit status checks for merge blocking

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Post pending commit status
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          echo "${GITHUB_TOKEN}" | gh auth login --with-token
          python commit_status.py \
            --state pending \
            --description "running prompt evaluations..." \
            --context "prompt-metrics/eval" \
            --sha "${{ github.sha }}" \
            --target-url "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e .

      - name: Fetch baseline metrics
        run: python fetch_baseline.py
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run eval harness
        run: python eval_harness.py --output latest_metrics.json --seed 42

      - name: Compare metrics vs baseline
        id: compare
        continue-on-error: true
        run: |
          python compare_metrics.py \
            --latest latest_metrics.json \
            --baseline baseline.json \
            --max-latency-pct 10 \
            --min-accuracy-drop 0.02 \
            --max-cost-pct 15 \
            --output comparison.md

      - name: Auto-label PR by accuracy delta
        if: github.event_name == 'pull_request'
        run: python label_pr.py --latest latest_metrics.json --baseline baseline.json --metric accuracy
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          GITHUB_REPOSITORY: ${{ github.repository }}

      - name: Post comparison to PR
        if: github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          path: comparison.md

      - name: Upload metrics artifact
        uses: actions/upload-artifact@v4
        with:
          name: prompt-metrics
          path: latest_metrics.json
          retention-days: 90

      - name: Post success commit status
        if: steps.compare.outcome == 'success'
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          python commit_status.py \
            --state success \
            --description "all metrics within thresholds" \
            --context "prompt-metrics/eval" \
            --sha "${{ github.sha }}" \
            --target-url "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"

      - name: Post failure commit status
        if: steps.compare.outcome == 'failure'
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          python commit_status.py \
            --state failure \
            --description "regression detected \u2014 see comparison output" \
            --context "prompt-metrics/eval" \
            --sha "${{ github.sha }}" \
            --target-url "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"

      - name: Fail job on regression
        if: steps.compare.outcome == 'failure'
        run: |
          echo "Regression detected \u2014 see comparison.md"
          exit 1
