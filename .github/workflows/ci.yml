name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest
          pip install -e .

      - name: Run pytest
        run: pytest tests/ -q

      - name: CLI sanity check
        run: |
          cat > mock.json << 'EOF'
          [
            {"id": "case_001", "input_prompt": "hello", "expected_text": "Echo: hello", "keywords": ["hello"]},
            {"id": "case_002", "input_prompt": "test", "expected_text": "Echo: test", "keywords": []}
          ]
          EOF
          python -m prompt_metrics --dataset mock.json --output-dir ./test_results
          test -f ./test_results/results.json
          test -f ./test_results/results.csv
          test -f ./test_results/report.md
          echo "CLI sanity check passed – all output files generated"
